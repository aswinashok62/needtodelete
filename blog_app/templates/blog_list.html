<h2>All Blogs</h2>


{% for blog in blogs %}
  <h2>{{ blog.title }}</h2>

  {% if blog.image %}
    <img src="{{ blog.image.url }}" width="300">
  {% endif %}

  <p>{{ blog.content }}</p>
  <small>{{ blog.author }}</small><br><br>

  <a href="{% url 'edit_blog' blog.id %}">Edit</a>
  |
  <a href="{% url 'delete_blog' blog.id %}"
     onclick="return confirm('Are you sure?')">
     Delete
  </a>

  <hr>
{% endfor %}
